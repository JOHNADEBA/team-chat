<div class="login-container">
  <div class="login-card">
    <h2>{{ isLoginMode ? 'Sign In' : 'Create Account' }}</h2>

    <!-- Success Message -->
    <div *ngIf="registrationSuccess" class="success-message">
      <p>✅ Registration successful!</p>
      <p>Please sign in with your new account.</p>
    </div>

    <form (ngSubmit)="onSubmit()" #authForm="ngForm">
      <!-- Name field -->
      <div *ngIf="!isLoginMode" class="form-group">
        <label>Name</label>
        <input
          type="text"
          [(ngModel)]="name"
          name="name"
          required
          [class.error]="nameError"
          placeholder="Enter your name"
          (input)="nameError = false; cdr.markForCheck()"
        />
        <div *ngIf="nameError" class="error-text">Name is required</div>
      </div>

      <!-- Email field -->
      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          email
          [class.error]="emailError"
          placeholder="Enter your email"
          (input)="emailError = false; cdr.markForCheck()"
        />
        <div *ngIf="emailError" class="error-text">Valid email is required</div>
      </div>

      <!-- Password field -->
      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          minlength="6"
          [class.error]="passwordError"
          placeholder="Enter your password"
          (input)="passwordError = false; cdr.markForCheck()"
        />
        <div *ngIf="passwordError" class="error-text">Password must be at least 6 characters</div>
      </div>

      <!-- Error Messages -->
      <div *ngIf="showError" class="error-message">
        <!-- User not found -->
        <div *ngIf="errorType === 'not-found'" class="error-box not-found">
          <p>👋 Account Not Found</p>
          <button class="action-button" (click)="switchToRegister()">Create Account Now</button>
        </div>

        <!-- Wrong password -->
        <div *ngIf="errorType === 'wrong-password'" class="error-box wrong-password">
          <p>🔐 Incorrect Password</p>
          <button class="action-button danger" (click)="password = ''; focusPasswordInput()">
            Try Again
          </button>
        </div>

        <!-- User already exists -->
        <div *ngIf="errorType === 'already-exists'" class="error-box already-exists">
          <p>📧 Email Already Registered</p>
          <button class="action-button" (click)="switchToLogin()">Sign In Instead</button>
        </div>

        <!-- Generic error -->
        <div *ngIf="errorType === 'generic'" class="error-box generic">
          {{ errorMessage }}
        </div>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        [disabled]="loading"
        [class.sign-in]="isLoginMode"
        [class.sign-up]="!isLoginMode"
        class="submit-button"
      >
        <span *ngIf="loading" class="spinner">⚡</span>
        {{
          loading
            ? isLoginMode
              ? 'Signing in...'
              : 'Creating...'
            : isLoginMode
              ? 'Sign In'
              : 'Create Account'
        }}
      </button>

      <!-- Toggle Mode -->
      <div style="text-align: center">
        <button class="link-button" type="button" (click)="toggleMode()">
          {{ isLoginMode ? 'Need an account? Sign up' : 'Already have an account? Sign in' }}
        </button>
      </div>
    </form>
  </div>
</div>
